naftiko: 1.0.0-alpha1
info:
  title: Apache BookKeeper Admin API - Shared Operations
  description: >-
    Shared per-API operation definitions for the Apache BookKeeper HTTP Admin API covering
    monitoring, configuration, ledger management, bookie management, and auto-recovery operations.
  version: 4.16.0
  contact:
    name: Apache BookKeeper Community
    url: https://bookkeeper.apache.org/

operations:
  - operationId: getHeartbeat
    summary: Get Heartbeat Status
    description: Verify a bookie is alive and responding.
    method: GET
    path: /heartbeat
    server:
      rest:
        url: http://localhost:8080
        port: 8100
      mcp:
        port: 9100

  - operationId: getMetrics
    summary: Get Bookie Metrics
    description: Retrieve Prometheus-format metrics from a bookie.
    method: GET
    path: /metrics
    server:
      rest:
        url: http://localhost:8080
        port: 8100
      mcp:
        port: 9100

  - operationId: getServerConfig
    summary: Get Server Configuration
    description: Retrieve the current running configuration of a bookie.
    method: GET
    path: /api/v1/config/server_config
    server:
      rest:
        url: http://localhost:8080
        port: 8100
      mcp:
        port: 9100

  - operationId: listLedgers
    summary: List Ledgers
    description: List all ledgers stored on the bookie.
    method: GET
    path: /api/v1/ledger/list
    server:
      rest:
        url: http://localhost:8080
        port: 8100
      mcp:
        port: 9100

  - operationId: getLedgerMetadata
    summary: Get Ledger Metadata
    description: Retrieve metadata for a specific ledger by ID.
    method: GET
    path: /api/v1/ledger/metadata
    server:
      rest:
        url: http://localhost:8080
        port: 8100
      mcp:
        port: 9100

  - operationId: getClusterInfo
    summary: Get Cluster Info
    description: Retrieve cluster-wide status including bookie counts and replication state.
    method: GET
    path: /api/v1/bookie/cluster_info
    server:
      rest:
        url: http://localhost:8080
        port: 8100
      mcp:
        port: 9100

  - operationId: getBookieState
    summary: Get Bookie State
    description: Retrieve the current operational state of a bookie.
    method: GET
    path: /api/v1/bookie/state
    server:
      rest:
        url: http://localhost:8080
        port: 8100
      mcp:
        port: 9100

  - operationId: whoIsAuditor
    summary: Who Is Auditor
    description: Return the hostname of the currently elected auditor.
    method: GET
    path: /api/v1/autorecovery/who_is_auditor
    server:
      rest:
        url: http://localhost:8080
        port: 8100
      mcp:
        port: 9100

  - operationId: listUnderReplicatedLedgers
    summary: List Under Replicated Ledgers
    description: List all ledger IDs that are currently under-replicated.
    method: GET
    path: /api/v1/autorecovery/list_under_replicated_ledger
    server:
      rest:
        url: http://localhost:8080
        port: 8100
      mcp:
        port: 9100

  - operationId: triggerAudit
    summary: Trigger Audit
    description: Trigger an immediate audit of the BookKeeper cluster.
    method: PUT
    path: /api/v1/autorecovery/trigger_audit
    server:
      rest:
        url: http://localhost:8080
        port: 8100
      mcp:
        port: 9100
